<!DOCTYPE html>
<html>

<head>
<title>Markdown Notebook</title>

<script src="lib/jquery.min.js"></script>
<script src="lib/marked.min.js"></script>
<script src="lib/prettify.min.js"></script>
<script src="lib/strapdown.js"></script>
<script src="lib/params.js"></script>
<link rel="stylesheet" href="lib/strapdown.css" />
<link rel="stylesheet" href="lib/mdown-style.css" />
</head>
<body>

<!--
Do our own navbar so that Strapdown won't insert one with the wrong class for the brand.
 -->
<div class="navbar navbar-static-top"> 
    <div class="navbar-inner">
        <div class="container">
            <div id="headline" class="brand">
                Markdown Notebook
            </div>
        </div>
    </div>
</div>

<xmp id="markdown" theme="paper" style="display:none;"></xmp>
<h1 id="loading">Loading...</h1>

<script>

// Globals
var titleStart = "Markdown Notebook - ";

// set marked options
marked.setOptions({
  renderer: new marked.Renderer(),
  gfm: true,
  tables: true,
  breaks: false,
  pedantic: false,
})

function render(path) {
  var xmp = document.getElementById("markdown");

  // set theme first.
  var theme = getParameterByName("theme")
  if (theme && theme && theme.length > 0) {
    $(xmp).attr('theme', theme)
  }

  $.get(path, function(data) {
    xmp.innerHTML = data;
    strapdown(window, document)
    
    // We want to fix up the page title
    var titleEl = document.getElementsByTagName('title')[0]
    // We'll pull from the first h1 on the page, if present
    var docTitleEl = document.getElementsByTagName('h1')[0]
    if(docTitleEl) {
        titleEl.innerHTML = titleStart + docTitleEl.innerHTML
    }
    

    $('#loading').hide()
  })
}

var hash = window.location.hash.substring(1)
if (hash.length > 0) {
  render(hash)
} else {
  window.location.hash = "#sample.md"
  window.location.reload()
}

window.onhashchange = function(){
  window.location.reload()
}
</script>
</body>
</html>
